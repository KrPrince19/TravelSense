name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '25'

      - name: Install Backend Dependencies
        working-directory: ./TravelSense-Backend
        run: npm install

      - name: Install Frontend Dependencies
        working-directory: ./TravelSense-Frontend/frontend
        run: npm install

      - name: Run Frontend Lint
        working-directory: ./TravelSense-Frontend/frontend
        run: npm run lint

  deploy-backend:
    name: Deploy to Render
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is not set in GitHub Settings > Secrets"
            exit 1
          fi
          curl -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deployment triggered successfully!"

  deploy-frontend:
    name: Deploy to Vercel
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        working-directory: ./TravelSense-Frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.TRAVELSENSE_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        working-directory: ./TravelSense-Frontend
        run: vercel build --prod --token=${{ secrets.TRAVELSENSE_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        working-directory: ./TravelSense-Frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.TRAVELSENSE_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}


